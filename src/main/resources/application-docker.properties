# Profile khi chạy trong Docker (docker-compose đặt SPRING_PROFILES_ACTIVE=docker).
# Datasource: ưu tiên SPRING_DATASOURCE_URL (docker-compose); không set thì dùng MYSQL_HOST (Render, v.v.).
# Render đặt PORT — phải bind đúng cổng này.
server.port=${PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL_HOST:mysql}:3306/${MYSQL_DATABASE:db_j2ee_dack}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.h2.console.enabled=false
