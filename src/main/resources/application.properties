# ==============================================================
# 1. KẾT NỐI DATABASE (RAILWAY)
# ==============================================================
# Đã tách biệt URL và thông tin đăng nhập để tránh xung đột
spring.datasource.url=jdbc:mysql://junction.proxy.rlwy.net:56929/railway
spring.datasource.username=root
spring.datasource.password=jiFuRrIJcwWUvYrgLEhLPmfSTXbmSAPJ
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Sử dụng HikariCP để quản lý kết nối ổn định hơn
spring.datasource.type=com.zaxxer.hikari.HikariDataSource

# ==============================================================
# 2. CẤU HÌNH HIBERNATE / JPA
# ==============================================================
# Tự động tạo/cập nhật bảng dựa trên các class @Entity
spring.jpa.hibernate.ddl-auto=update

# Hiển thị câu lệnh SQL ra Log để bạn dễ debug xem bảng đã được tạo chưa
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Sử dụng Dialect phù hợp với các phiên bản MySQL mới trên Cloud
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Đảm bảo Hibernate khởi tạo ngay khi ứng dụng bắt đầu
spring.jpa.defer-datasource-initialization=true

