# Mặc định: profile dev (H2 in-memory) — chạy jar không cần MySQL.
# Docker: docker-compose đặt SPRING_PROFILES_ACTIVE=docker và đọc thêm application-docker.properties.
#   Biến môi trường (Spring Boot): SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
#   URL JDBC trong mạng Docker dùng tên service MySQL, ví dụ: jdbc:mysql://mysql:3306/db_j2ee_dack
spring.profiles.default=dev

# Dữ liệu mẫu khi khởi động (role, user admin/customer, sách) — idempotent, tắt: false
app.sample-data.enabled=true

# Cấu hình Hibernate (datasource + dialect theo từng profile: dev / mysql)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Cấu hình lưu file ảnh (phục vụ câu 2)
logging.level.org.springframework.security=DEBUG

