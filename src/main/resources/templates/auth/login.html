<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/auth-layout :: authLayout(~{:: section}, 'Đăng nhập · ComicStore')}">
<body>
<section class="auth-split">
    <div class="auth-split-visual" aria-hidden="true">
        <span class="auth-deco c1"></span>
        <span class="auth-deco t1"></span>
        <span class="auth-deco sq"></span>
        <span class="auth-deco t2"></span>
        <div class="auth-blob">
            <svg class="auth-laptop-svg" viewBox="0 0 280 220" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="48" y="36" width="184" height="118" rx="10" fill="#4a4a4a"/>
                <rect x="58" y="48" width="164" height="88" rx="4" fill="#3a3a3a"/>
                <circle cx="140" cy="92" r="22" stroke="#fff" stroke-width="3" fill="none"/>
                <path d="M140 104v12M128 98c4 8 8 12 12 12s8-4 12-12" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
                <path d="M76 166h128l-8 18H84l-8-18z" fill="#6d6d6d"/>
                <rect x="40" y="162" width="200" height="8" rx="2" fill="#8a8a8a"/>
            </svg>
        </div>
    </div>

    <div class="auth-panel">
        <h1 class="auth-title">Đăng nhập thành viên</h1>
        <p class="auth-sub">Chào mừng trở lại ComicStore. Đăng nhập để mua sách và theo dõi đơn hàng.</p>

        <div class="auth-param-flash err" th:if="${param.error}">Sai tên đăng nhập hoặc mật khẩu</div>
        <div class="auth-param-flash ok" th:if="${param.logout}">Bạn đã đăng xuất</div>

        <form class="auth-form" th:action="@{/login}" method="post">
            <div class="auth-field">
                <span class="auth-field-ico" aria-hidden="true">✉</span>
                <input type="text" name="username" autocomplete="username" placeholder="Tên đăng nhập" required/>
            </div>
            <div class="auth-field">
                <span class="auth-field-ico" aria-hidden="true">🔒</span>
                <input type="password" name="password" autocomplete="current-password" placeholder="Mật khẩu" required/>
            </div>
            <button type="submit" class="auth-submit">Đăng nhập</button>
        </form>

        <a class="auth-forgot" th:href="@{/forgot-password}">Quên mật khẩu?</a>

        <div class="auth-footer-row">
            <a class="auth-alt-link" th:href="@{/register}">
                Tạo tài khoản mới <span class="arr">→</span>
            </a>
        </div>
    </div>
</section>
</body>
</html>
