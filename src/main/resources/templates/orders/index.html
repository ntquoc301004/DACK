<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section}, 'Don hang cua toi · ComicStore')}">
<section class="orders-page">
    <th:block th:replace="~{fragments/account-shell :: shell('orders', ~{:: #acc-body})}">
        <div id="acc-body" class="acc-body">
            <h2 class="acc-section-title">Don hang cua toi</h2>
            <p class="acc-section-lead muted">Theo doi trang thai cac don da dat.</p>

            <div th:if="${#lists.isEmpty(orders)}" class="acc-empty">
                Ban chua co don hang nao. <a th:href="@{/home}">Tiep tuc mua sam</a>
            </div>

            <div class="acc-table" th:if="${!#lists.isEmpty(orders)}">
                <div class="acc-table-row acc-table-head">
                    <div>Ngay dat</div>
                    <div class="acc-num">Tong tien</div>
                    <div class="acc-num">Trang thai</div>
                </div>
                <div class="acc-table-row" th:each="o : ${orders}">
                    <div th:text="${#temporals.format(o.orderDate, 'dd/MM/yyyy HH:mm')}">-</div>
                    <div class="acc-num">
                        <div th:text="${#numbers.formatDecimal(o.totalPrice, 1, 'POINT', 0, 'COMMA')} + ' d'">0 d</div>
                        <small class="muted" th:if="${o.discountAmount != null and o.discountAmount.signum() > 0}"
                               th:text="${'Da giam ' + #numbers.formatDecimal(o.discountAmount, 1, 'POINT', 0, 'COMMA') + ' d' + (o.couponCode != null ? ' (' + o.couponCode + ')' : '')}">Giam gia</small>
                    </div>
                    <div class="acc-num"
                         th:text="${o.status.name() == 'PENDING' ? 'Cho thanh toan' : (o.status.name() == 'PAID' ? 'Da thanh toan' : (o.status.name() == 'APPROVED' ? 'Da duyet - dang giao' : 'Da huy'))}">-</div>
                </div>
            </div>
        </div>
    </th:block>
</section>
</html>
