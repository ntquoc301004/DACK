# CI: mỗi push/PR chạy test + build Maven; kiểm tra Docker image build được.
# CD (đẩy image / deploy server): bật thêm job khi đã có registry + secrets — xem README hoặc comment bên dưới.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  maven:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Test and package
        run: mvn -B verify

  docker-build:
    runs-on: ubuntu-latest
    needs: maven
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dack-backend:ci .

# Gợi ý CD (tùy nơi host):
# - Docker Hub: thêm DOCKER_USERNAME + DOCKER_PASSWORD (Personal Access Token) trong Repo secrets,
#   sau bước build: docker login && docker push youruser/dack_bookie_store:tag
# - Deploy VPS: SSH + docker compose pull && docker compose up -d (dùng secret SSH key)
