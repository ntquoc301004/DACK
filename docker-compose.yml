services:
  mysql:
    image: mysql:8.4
    container_name: dack-mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: db_j2ee_dack
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  backend:
    build: .
    # Docker Hub: tạo repo tquoc3010/dack_bookie_store (hoặc đổi prefix nếu account khác).
    image: tquoc3010/dack_bookie_store:latest
    container_name: dack-bookie-store
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_j2ee_dack?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
